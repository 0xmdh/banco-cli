<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Banco CLI × Wake Up Labs</title>
    <script>
      (function () {
        var t = null;
        try {
          t = localStorage.getItem("banco-cli-theme");
        } catch (e) {}
        if (t !== "light" && t !== "dark") {
          t = "light";
        }
        document.documentElement.setAttribute("data-theme", t);
      })();
    </script>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <main class="section" style="min-height: 60vh; display: flex; align-items: center">
      <div class="container">
        <p class="section-lead" style="margin-bottom: 1rem">
          El contenido para personas y empresas está en la página principal.
        </p>
        <a class="btn btn-primary" href="../">Ir al inicio</a>
      </div>
    </main>
    <footer class="site-footer">
      <div class="container footer-inner">
        <p class="footer-note">Wake Up Labs · Banco CLI</p>
      </div>
    </footer>
  </body>
</html>
